name: Test Runner

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  formatting:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Download Nix Dependencies
        run: nix develop

      - name: Check Formatting
        run: make format-check

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Download Nix Dependencies
        run: nix develop

      - name: Lint with Clippy
        run: make clippy

  unused-deps:
    name: Check for Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: machete
        uses: bnjbvr/cargo-machete@main

  # Build the test runner once and publish the compiled binary as an artifact.
  # The two test shards and the merge job download that binary and run it
  # directly, so the ~3-minute compile happens exactly once here instead of
  # being repeated (a `cargo run`/`make` in each job re-checks and rebuilds the
  # whole workspace even from a warm cache, which was the bottleneck).
  build-test-runner:
    name: Build Test Runner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Download Nix Dependencies
        run: nix develop

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Test Runner
        run: make build-test-runner

      - name: Upload test-runner binary
        uses: actions/upload-artifact@v4
        with:
          name: test-runner-binary
          path: target/release/test-runner
          retention-days: 1

  # Run one half of the test suite. The matrix fans this single job definition
  # out into test (shard 0) and test (shard 1); each downloads the prebuilt
  # test-runner binary, runs its interleaved half of the tests, and uploads its
  # partial STATUS.md as an artifact for the merge job. No compilation here.
  test:
    name: Run Tests (shard ${{ matrix.shard }})
    needs: build-test-runner
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Download Nix Dependencies
        run: nix develop

      # The runner shells out to `cargo metadata` to locate the noir test
      # programs, which needs the resolved registry/git dependency caches.
      # Restore-only (no build), so this is the cheap ~25s restore, not a
      # rebuild.
      - name: Restore Cargo dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Download test-runner binary
        uses: actions/download-artifact@v4
        with:
          name: test-runner-binary
          path: target/release

      - name: Run Tests
        run: |
          chmod +x target/release/test-runner
          nix develop --command target/release/test-runner --output STATUS.part.md --jobs 4 --shard ${{ matrix.shard }} --shards 2

      - name: Upload partial STATUS.md
        uses: actions/upload-artifact@v4
        with:
          name: status-shard-${{ matrix.shard }}
          path: STATUS.part.md
          retention-days: 1

  # Merge the two shards' partial results into the final STATUS.md, then run the
  # commit / regression / growth-comment steps that previously lived in the
  # single test job.
  merge-results:
    name: Merge Test Results
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Generate MavrosBot token
        id: app-token
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.STATUS_UPDATE_APP_ID }}
          private-key: ${{ secrets.STATUS_UPDATE_APP_PRIVATE_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Download Nix Dependencies
        run: nix develop

      # The merge / regression / growth modes only read STATUS.md files — they
      # never invoke cargo or touch the workspace — so the prebuilt binary is
      # all that's needed here, no cargo cache or rebuild.
      - name: Download test-runner binary
        uses: actions/download-artifact@v4
        with:
          name: test-runner-binary
          path: target/release

      - name: Download shard 0 results
        uses: actions/download-artifact@v4
        with:
          name: status-shard-0
          path: shard-0

      - name: Download shard 1 results
        uses: actions/download-artifact@v4
        with:
          name: status-shard-1
          path: shard-1

      - name: Merge STATUS.md
        run: |
          chmod +x target/release/test-runner
          nix develop --command target/release/test-runner --merge shard-0/STATUS.part.md shard-1/STATUS.part.md --output STATUS.md

      - name: Commit STATUS.md
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "MavrosBot[bot]"
          git config user.email "282911374+MavrosBot[bot]@users.noreply.github.com"
          git add STATUS.md
          git diff --cached --quiet || git commit -m "Update STATUS.md [skip ci]"
          git push origin HEAD:main

      - name: Fetch Baseline
        if: github.event_name == 'pull_request'
        id: baseline
        run: |
          if git show origin/main:STATUS.md > baseline-STATUS.md 2>/dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No baseline found, skipping checks"
          fi

      - name: Check for Regressions
        if: github.event_name == 'pull_request' && steps.baseline.outputs.found == 'true'
        run: nix develop --command target/release/test-runner --check-regression baseline-STATUS.md STATUS.md

      - name: Comment on Constraint/Witness Growth
        if: github.event_name == 'pull_request' && steps.baseline.outputs.found == 'true' && !cancelled()
        run: |
          COMMENT=$(nix develop --command target/release/test-runner --check-growth baseline-STATUS.md STATUS.md)
          echo "$COMMENT" >> "$GITHUB_STEP_SUMMARY"
          # GITHUB_TOKEN is read-only on fork PRs, so commenting would fail there;
          # the report is still visible in the job summary above.
          if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body "$COMMENT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
